<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>OfficeSpace - Debug Index</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        color: #eee;
      }

    </style>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="game-container"></div>

    <!-- Bottombar - replace existing #bottombar with this -->
    <div
      id="bottombar"
      style="
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px 12px;
        background: #0b0b0b;
        border-top: 1px solid #222;
        z-index: 10000;
      "
    >
      <div style="color: #ccc; margin-right: 6px; white-space: nowrap">
        Say something:
      </div>
      <input
        id="chatInput"
        placeholder="Type message and press Enter"
        style="
          flex: 1;
          padding: 8px;
          border-radius: 6px;
          border: 1px solid #333;
          background: #111;
          color: #fff;
          outline: none;
        "
      />
      <button
        id="chatSend"
        style="
          margin-left: 6px;
          padding: 8px 12px;
          border-radius: 6px;
          background: #1e90ff;
          color: #fff;
          border: none;
          cursor: pointer;
        "
      >
        Send
      </button>
    </div>

    <!-- prejoin overlay (keeps same ids your client expects) -->
    <div id="prejoin">
      <h1 style="margin: 0 0 8px 0">Welcome to Office Space</h1>
      <h3 style="margin: 0 0 8px 0">Please show some ID</h3>
      <label style="display: block; margin-top: 8px">What is your name?</label>
      <input id="playerName" placeholder="Your name" />
      <label style="display: block; margin-top: 8px">What do you look like?</label>
      <select id="avatarSelect">
        <option value="0">An old man in brown suit</option>
        <option value="1">A man in black suit and a stripey shirt</option>
        <option value="2">A young man in blue suit</option>
        <option value="3">A surgeon with mask</option>
        <option value="4">A surgeon without mask</option>
        <option value="5">A blonde woman in white</option>
        <option value="6">A doctor with glasses</option>
        <option value="7">A man in black suit with brown waistcoat</option>
      </select>
      <button id="joinBtn">Pass security</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>
      console.log(
        "[index] document loaded. Phaser version:",
        typeof Phaser !== "undefined" ? Phaser.VERSION : "Phaser not loaded",
      );
      if (typeof io === "undefined") {
        console.error(
          "[index] socket.io client not found at /socket.io/socket.io.js — check server is running and socket.io is installed on the server.",
        );
        document.getElementById("log").textContent = "socket.io client missing";
      } else {
        console.log("[index] socket.io client loaded, OK");
      }
    </script>

    <script src="game.js"></script>
  </body>
</html>
